<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz List - QuizMaster Admin</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .admin-layout {
            display: grid;
            grid-template-columns: 260px 1fr;
            min-height: 100vh;
        }

        .sidebar {
            background: #f8fafc;
            border-right: 1px solid var(--glass-border);
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .main-content {
            padding: 3rem;
        }

        .sidebar-nav {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .sidebar-nav a {
            padding: 1rem;
            border-radius: 0.75rem;
            color: var(--text-muted);
            text-decoration: none;
            transition: var(--transition);
        }

        .sidebar-nav a:hover, .sidebar-nav a.active {
            background: var(--primary);
            color: white;
        }

        .quiz-list-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
        }

        .quiz-admin-card {
            padding: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="admin-layout">
        <aside class="sidebar">
            <div class="brand">QuizMaster Admin</div>
            <ul class="sidebar-nav">
                <li><a href="/admin/dashboard.html">Dashboard</a></li>
                <li><a href="/admin/users.html">User Management</a></li>
                <li><a href="/admin/quiz-list.html" class="active">Quizzes</a></li>
                <li><a href="/admin/quiz-create.html">Create Quiz</a></li>
                <li style="margin-top: 2rem;"><a href="#" onclick="logout()">Logout</a></li>
            </ul>
        </aside>

        <main class="main-content fade-in">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <h1>All Quizzes</h1>
                <a href="/admin/quiz-create.html" class="btn btn-primary">Create New</a>
            </div>

            <div class="quiz-list-container" id="quiz-list">
                <!-- Quizzes populated by JS -->
            </div>
        </main>
    </div>

    <!-- Edit Modal (Simplified for Title/Category) -->
    <div id="edit-quiz-modal" class="auth-container" style="display:none; position:fixed; top:0; left:0; right:0; bottom:0; z-index:100; background:rgba(255,255,255,0.8); backdrop-filter:blur(5px);">
        <div class="glass auth-card">
            <h2 style="margin-bottom: 2rem;">Edit Quiz Info</h2>
            <form id="edit-quiz-form">
                <input type="hidden" id="edit-quiz-id">
                <div class="form-group">
                    <label>Quiz Title</label>
                    <input type="text" id="edit-title" class="form-input" required>
                </div>
                <div class="form-group" style="margin-bottom: 2rem;">
                    <label>Category</label>
                    <input type="text" id="edit-category" class="form-input" required>
                </div>
                <div style="display: flex; gap: 1rem;">
                    <button type="submit" class="btn btn-primary" style="flex: 1;">Save Changes</button>
                    <button type="button" onclick="document.getElementById('edit-quiz-modal').style.display='none'" class="btn btn-outline" style="flex: 1;">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script>
        if (!isAdmin()) window.location.href = '/login.html';

        async function loadQuizzes() {
            const quizzes = await api.get('/quiz/all');
            const container = document.getElementById('quiz-list');
            
            if (quizzes.length === 0) {
                container.innerHTML = '<p style="color: var(--text-muted);">No quizzes found. Create your first one!</p>';
                return;
            }

            container.innerHTML = quizzes.map(q => `
                <div class="glass quiz-admin-card fade-in">
                    <span class="badge" style="margin-bottom: 0.5rem;">${q.category}</span>
                    <h3 style="margin-bottom: 1rem;">${q.title}</h3>
                    <p style="color: var(--text-muted); font-size: 0.875rem; margin-bottom: 1.5rem;">
                        ${q.numQuestions} Questions • ${q.pointPerQuestion} per question
                    </p>
                    <div style="display: flex; gap: 0.5rem;">
                        <button onclick="openEditModal('${q._id}', '${q.title}', '${q.category}')" class="btn btn-outline" style="flex:1; font-size: 0.875rem;">Edit</button>
                        <button onclick="deleteQuiz('${q._id}')" class="btn btn-outline" style="flex:1; font-size: 0.875rem; border-color: rgba(239, 68, 68, 0.4); color: #ef4444;">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        function openEditModal(id, title, category) {
            document.getElementById('edit-quiz-id').value = id;
            document.getElementById('edit-title').value = title;
            document.getElementById('edit-category').value = category;
            document.getElementById('edit-quiz-modal').style.display = 'flex';
        }

        document.getElementById('edit-quiz-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('edit-quiz-id').value;
            const title = document.getElementById('edit-title').value;
            const category = document.getElementById('edit-category').value;

            const res = await api.put(`/quiz/update/${id}`, { title, category });
            if (res._id) {
                alert('Quiz updated successfully');
                document.getElementById('edit-quiz-modal').style.display = 'none';
                loadQuizzes();
            }
        });

        async function deleteQuiz(id) {
            if (confirm('Are you sure you want to delete this quiz?')) {
                const res = await api.delete(`/quiz/delete/${id}`);
                if (res.message) {
                    alert('Quiz deleted');
                    loadQuizzes();
                }
            }
        }

        loadQuizzes();
    </script>
</body>
</html>
