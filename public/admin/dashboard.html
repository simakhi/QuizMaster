<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - QuizMaster</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .admin-layout {
            display: grid;
            grid-template-columns: 260px 1fr;
            min-height: 100vh;
        }

        .sidebar {
            background: #f8fafc;
            border-right: 1px solid var(--glass-border);
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .sidebar-nav {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .sidebar-nav a {
            padding: 1rem;
            border-radius: 0.75rem;
            color: var(--text-muted);
            text-decoration: none;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .sidebar-nav a:hover, .sidebar-nav a.active {
            background: var(--primary);
            color: white;
            border: 1px solid var(--primary);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .main-content {
            padding: 3rem;
        }
    </style>
</head>
<body>
    <div class="admin-layout">
        <aside class="sidebar">
            <div class="brand">QuizMaster Admin</div>
            <ul class="sidebar-nav">
                <li><a href="/admin/dashboard.html" class="active">Dashboard</a></li>
                <li><a href="/admin/users.html">User Management</a></li>
                <li><a href="/admin/quiz-list.html">Quizzes</a></li>
                <li><a href="/admin/quiz-create.html">Create Quiz</a></li>
                <li style="margin-top: 2rem;"><a href="#" onclick="logout()">Logout</a></li>
            </ul>
        </aside>

        <main class="main-content fade-in">
            <h1 style="margin-bottom: 2rem;">Overview</h1>
            
            <div class="stats-grid">
                <div class="glass" style="padding: 2rem;">
                    <p style="color: var(--text-muted); font-size: 0.875rem;">Total Registered Users</p>
                    <h2 style="font-size: 2.5rem; color: var(--primary);" id="total-users">0</h2>
                </div>
                <div class="glass" style="padding: 2rem;">
                    <p style="color: var(--text-muted); font-size: 0.875rem;">Total Active Quizzes</p>
                    <h2 style="font-size: 2.5rem; color: var(--secondary);" id="total-quizzes">0</h2>
                </div>
            </div>

            <h2 style="margin-bottom: 1.5rem;">Recent Actions</h2>
            <div class="glass" style="padding: 2rem; min-height: 400px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center;">
                <p style="color: var(--text-muted);">Welcome to the Admin Panel. From here you can manage all users and create new quiz content.</p>
                <div style="margin-top: 2rem; display: flex; gap: 1rem;">
                    <a href="/admin/quiz-create.html" class="btn btn-primary">Create New Quiz</a>
                    <a href="/admin/users.html" class="btn btn-outline">Explore Users</a>
                </div>
            </div>
        </main>
    </div>

    <script src="../js/api.js"></script>
    <script>
        if (!isAdmin()) window.location.href = '/login.html';

        async function loadStats() {
            const stats = await api.get('/quiz/stats/summary');
            document.getElementById('total-users').innerText = stats.totalUsers;
            document.getElementById('total-quizzes').innerText = stats.totalQuizzes;
        }

        loadStats();
    </script>
</body>
</html>
