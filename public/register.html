<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - QuizMaster</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-container">
        <div class="glass auth-card fade-in">
            <h2 style="text-align: center; margin-bottom: 2rem;">Create Account</h2>
            <form id="register-form">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="name" class="form-input" placeholder="Enter your full name" required>
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" id="phone" class="form-input" placeholder="Enter your phone number" required>
                </div>
                <div class="form-group" style="margin-bottom: 2rem;">
                    <label>Password</label>
                    <input type="password" id="password" class="form-input" placeholder="Choose a secure password" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Sign Up Now</button>
            </form>
            <p style="text-align: center; margin-top: 1.5rem; color: var(--text-muted);">
                Already have an account? <a href="/login.html" style="color: var(--primary); text-decoration: none;">Login</a>
            </p>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('password').value;

            const res = await api.post('/auth/register', { name, phone, password });
            if (res.token) {
                localStorage.setItem('token', res.token);
                localStorage.setItem('user', JSON.stringify(res.user));
                window.location.href = '/dashboard.html';
            } else {
                alert(res.message || 'Registration failed');
            }
        });
    </script>
</body>
</html>
